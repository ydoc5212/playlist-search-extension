<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    font-family: Roboto, Arial, sans-serif;
    color: #fff;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .concept {
    position: relative;
    width: 100%;
    aspect-ratio: 16/10;
    background: #0f0f0f;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .concept-label {
    position: absolute;
    bottom: 16px;
    left: 20px;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    z-index: 10;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .concept svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  h1 {
    text-align: center;
    padding: 40px 40px 0;
    font-size: 24px;
    font-weight: 900;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1>Line Concepts</h1>

<div class="grid">

  <!-- A: Chevron shards — opposing diagonals creating a central chevron -->
  <div class="concept">
    <svg viewBox="0 0 1280 800" preserveAspectRatio="none">
      <!-- Main chevron -->
      <line x1="0" y1="0" x2="640" y2="400" stroke="#FF0000" stroke-width="1.5" opacity="0.25"/>
      <line x1="1280" y1="0" x2="640" y2="400" stroke="#FF0000" stroke-width="1.5" opacity="0.25"/>
      <!-- Lower echo -->
      <line x1="0" y1="200" x2="640" y2="600" stroke="#FF0000" stroke-width="1" opacity="0.12"/>
      <line x1="1280" y1="200" x2="640" y2="600" stroke="#FF0000" stroke-width="1" opacity="0.12"/>
      <!-- Fill triangle -->
      <polygon points="0,0 1280,0 640,400" fill="#FF0000" opacity="0.04"/>
      <polygon points="0,200 1280,200 640,600" fill="#FF0000" opacity="0.02"/>
      <!-- Cross lines -->
      <line x1="0" y1="800" x2="640" y2="400" stroke="#FF0000" stroke-width="0.8" opacity="0.08"/>
      <line x1="1280" y1="800" x2="640" y2="400" stroke="#FF0000" stroke-width="0.8" opacity="0.08"/>
    </svg>
    <div class="concept-label">A — Chevron Shards</div>
  </div>

  <!-- B: Grid fracture — parallel diagonals both directions forming diamonds -->
  <div class="concept">
    <svg viewBox="0 0 1280 800" preserveAspectRatio="none">
      <!-- Forward diagonals -->
      <line x1="-200" y1="0" x2="600" y2="800" stroke="#FF0000" stroke-width="1" opacity="0.15"/>
      <line x1="200" y1="0" x2="1000" y2="800" stroke="#FF0000" stroke-width="1.5" opacity="0.2"/>
      <line x1="600" y1="0" x2="1400" y2="800" stroke="#FF0000" stroke-width="1" opacity="0.15"/>
      <!-- Back diagonals -->
      <line x1="1480" y1="0" x2="680" y2="800" stroke="#FF0000" stroke-width="1" opacity="0.15"/>
      <line x1="1080" y1="0" x2="280" y2="800" stroke="#FF0000" stroke-width="1.5" opacity="0.2"/>
      <line x1="680" y1="0" x2="-120" y2="800" stroke="#FF0000" stroke-width="1" opacity="0.15"/>
      <!-- Diamond fills at intersections -->
      <polygon points="640,0 1040,400 640,800 240,400" fill="#FF0000" opacity="0.03"/>
      <polygon points="440,200 640,400 440,600 240,400" fill="#FF0000" opacity="0.02"/>
      <polygon points="840,200 1040,400 840,600 640,400" fill="#FF0000" opacity="0.02"/>
    </svg>
    <div class="concept-label">B — Grid Fracture</div>
  </div>

  <!-- C: Shattered pane — asymmetric triangles like broken glass -->
  <div class="concept">
    <svg viewBox="0 0 1280 800" preserveAspectRatio="none">
      <!-- Primary fractures from offset point -->
      <line x1="480" y1="300" x2="0" y2="0" stroke="#FF0000" stroke-width="1.5" opacity="0.25"/>
      <line x1="480" y1="300" x2="1280" y2="0" stroke="#FF0000" stroke-width="1" opacity="0.18"/>
      <line x1="480" y1="300" x2="0" y2="800" stroke="#FF0000" stroke-width="1" opacity="0.15"/>
      <line x1="480" y1="300" x2="1280" y2="500" stroke="#FF0000" stroke-width="1.2" opacity="0.2"/>
      <line x1="480" y1="300" x2="1280" y2="800" stroke="#FF0000" stroke-width="0.8" opacity="0.12"/>
      <line x1="480" y1="300" x2="900" y2="800" stroke="#FF0000" stroke-width="0.8" opacity="0.1"/>
      <!-- Triangle fills -->
      <polygon points="480,300 0,0 1280,0" fill="#FF0000" opacity="0.035"/>
      <polygon points="480,300 1280,0 1280,500" fill="#FF0000" opacity="0.02"/>
      <polygon points="480,300 0,0 0,800" fill="#FF0000" opacity="0.025"/>
      <polygon points="480,300 1280,500 1280,800 900,800" fill="#FF0000" opacity="0.015"/>
    </svg>
    <div class="concept-label">C — Shattered Pane</div>
  </div>

  <!-- D: Horizon prism — horizontal line with triangles radiating up and down -->
  <div class="concept">
    <svg viewBox="0 0 1280 800" preserveAspectRatio="none">
      <!-- Horizon line -->
      <line x1="0" y1="400" x2="1280" y2="400" stroke="#FF0000" stroke-width="1.5" opacity="0.2"/>
      <!-- Upper prisms -->
      <line x1="300" y1="400" x2="500" y2="80" stroke="#FF0000" stroke-width="1" opacity="0.18"/>
      <line x1="700" y1="400" x2="500" y2="80" stroke="#FF0000" stroke-width="1" opacity="0.18"/>
      <polygon points="300,400 700,400 500,80" fill="#FF0000" opacity="0.04"/>
      <line x1="800" y1="400" x2="1100" y2="50" stroke="#FF0000" stroke-width="0.8" opacity="0.12"/>
      <line x1="1280" y1="400" x2="1100" y2="50" stroke="#FF0000" stroke-width="0.8" opacity="0.12"/>
      <polygon points="800,400 1280,400 1100,50" fill="#FF0000" opacity="0.025"/>
      <!-- Lower prisms -->
      <line x1="100" y1="400" x2="400" y2="720" stroke="#FF0000" stroke-width="0.8" opacity="0.1"/>
      <line x1="600" y1="400" x2="400" y2="720" stroke="#FF0000" stroke-width="0.8" opacity="0.1"/>
      <polygon points="100,400 600,400 400,720" fill="#FF0000" opacity="0.02"/>
      <line x1="700" y1="400" x2="1000" y2="750" stroke="#FF0000" stroke-width="0.8" opacity="0.1"/>
      <line x1="1200" y1="400" x2="1000" y2="750" stroke="#FF0000" stroke-width="0.8" opacity="0.1"/>
      <polygon points="700,400 1200,400 1000,750" fill="#FF0000" opacity="0.02"/>
    </svg>
    <div class="concept-label">D — Horizon Prism</div>
  </div>

  <!-- E: Converge — lines radiating from bottom-right corner -->
  <div class="concept">
    <svg viewBox="0 0 1280 800" preserveAspectRatio="none">
      <line x1="1280" y1="800" x2="0" y2="0" stroke="#FF0000" stroke-width="1.5" opacity="0.22"/>
      <line x1="1280" y1="800" x2="0" y2="300" stroke="#FF0000" stroke-width="1.2" opacity="0.18"/>
      <line x1="1280" y1="800" x2="0" y2="600" stroke="#FF0000" stroke-width="1" opacity="0.14"/>
      <line x1="1280" y1="800" x2="300" y2="0" stroke="#FF0000" stroke-width="1.2" opacity="0.18"/>
      <line x1="1280" y1="800" x2="700" y2="0" stroke="#FF0000" stroke-width="1" opacity="0.14"/>
      <line x1="1280" y1="800" x2="1100" y2="0" stroke="#FF0000" stroke-width="0.8" opacity="0.1"/>
      <!-- Cross line for triangle -->
      <line x1="0" y1="300" x2="700" y2="0" stroke="#FF0000" stroke-width="0.8" opacity="0.1"/>
      <line x1="0" y1="0" x2="0" y2="600" stroke="#FF0000" stroke-width="0.5" opacity="0.06"/>
      <!-- Triangle fills -->
      <polygon points="1280,800 0,0 0,300" fill="#FF0000" opacity="0.03"/>
      <polygon points="1280,800 0,300 0,600" fill="#FF0000" opacity="0.02"/>
      <polygon points="1280,800 300,0 700,0" fill="#FF0000" opacity="0.025"/>
    </svg>
    <div class="concept-label">E — Converge</div>
  </div>

  <!-- F: Wireframe terrain — overlapping triangles like low-poly mesh -->
  <div class="concept">
    <svg viewBox="0 0 1280 800" preserveAspectRatio="none">
      <!-- Row 1 -->
      <polygon points="0,250 320,100 640,250" fill="none" stroke="#FF0000" stroke-width="1" opacity="0.18"/>
      <polygon points="320,100 640,250 960,100" fill="#FF0000" stroke="#FF0000" stroke-width="1" opacity="0.03" fill-opacity="0.03"/>
      <polygon points="640,250 960,100 1280,250" fill="none" stroke="#FF0000" stroke-width="1" opacity="0.18"/>
      <!-- Row 2 -->
      <polygon points="0,250 320,400 640,250" fill="#FF0000" stroke="#FF0000" stroke-width="1" opacity="0.025" fill-opacity="0.025"/>
      <polygon points="320,400 640,250 960,400" fill="none" stroke="#FF0000" stroke-width="1" opacity="0.15"/>
      <polygon points="640,250 960,400 1280,250" fill="#FF0000" stroke="#FF0000" stroke-width="0.8" opacity="0.02" fill-opacity="0.02"/>
      <!-- Row 3 -->
      <polygon points="0,550 320,400 640,550" fill="none" stroke="#FF0000" stroke-width="0.8" opacity="0.12"/>
      <polygon points="320,400 640,550 960,400" fill="#FF0000" stroke="#FF0000" stroke-width="0.8" opacity="0.02" fill-opacity="0.02"/>
      <polygon points="640,550 960,400 1280,550" fill="none" stroke="#FF0000" stroke-width="0.8" opacity="0.12"/>
      <!-- Row 4 -->
      <polygon points="0,550 320,700 640,550" fill="#FF0000" stroke="#FF0000" stroke-width="0.6" opacity="0.015" fill-opacity="0.015"/>
      <polygon points="320,700 640,550 960,700" fill="none" stroke="#FF0000" stroke-width="0.6" opacity="0.08"/>
      <polygon points="640,550 960,700 1280,550" fill="none" stroke="#FF0000" stroke-width="0.6" opacity="0.08"/>
    </svg>
    <div class="concept-label">F — Wireframe Terrain</div>
  </div>

</div>

</body>
</html>
