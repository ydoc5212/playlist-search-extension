<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px;
    height: 280px;
    background: linear-gradient(135deg, #CC0000 0%, #FF0000 50%, #CC0000 100%);
    font-family: Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 0 32px;
  }

  .text-side {
    flex: 1;
    min-width: 0;
  }
  .text-side h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .text-side p {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }

  .mini-dialog {
    width: 170px;
    flex-shrink: 0;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    overflow: hidden;
  }

  .mini-header {
    padding: 8px 10px 6px;
    font-size: 9px;
    font-weight: 500;
    color: #0f0f0f;
    border-bottom: 1px solid #e5e5e5;
  }

  .mini-filter {
    padding: 6px 8px 4px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  .mini-input {
    width: 100%;
    height: 20px;
    border: 1px solid rgba(6,95,212,0.5);
    border-radius: 10px;
    padding: 0 8px;
    font-family: inherit;
    font-size: 8px;
    color: #0f0f0f;
  }
  .mini-meta {
    margin-top: 3px;
    font-size: 7px;
    color: #606060;
  }

  .mini-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
  }
  .mini-check {
    width: 10px;
    height: 10px;
    border: 1.5px solid #909090;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .mini-check.on {
    background: #065fd4;
    border-color: #065fd4;
  }
  .mini-name {
    font-size: 8px;
    color: #0f0f0f;
  }
  .mini-name mark {
    background: #bbdefb;
    color: #0f0f0f;
    border-radius: 1px;
    padding: 0 1px;
  }
</style>
</head>
<body>
  <div class="text-side">
    <h1>YouTube Playlist Filter</h1>
    <p>Search all your playlists — even beyond YouTube's 200 limit.</p>
  </div>
  <div class="mini-dialog">
    <div class="mini-header">Save video to...</div>
    <div class="mini-filter">
      <input class="mini-input" value="lofi" readonly>
      <div class="mini-meta">3 of 847 playlists</div>
    </div>
    <div class="mini-row">
      <div class="mini-check"></div>
      <span class="mini-name"><mark>lofi</mark> study sessions</span>
    </div>
    <div class="mini-row">
      <div class="mini-check on"></div>
      <span class="mini-name"><mark>lofi</mark> beats for focus</span>
    </div>
    <div class="mini-row">
      <div class="mini-check"></div>
      <span class="mini-name">chill <mark>lofi</mark> & rain</span>
    </div>
  </div>
</body>
</html>
