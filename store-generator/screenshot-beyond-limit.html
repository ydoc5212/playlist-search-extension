<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 800px;
    background: linear-gradient(160deg, #FF1A1A 0%, #CC0000 100%);
    font-family: Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    overflow: hidden;
    position: relative;
  }

  /* Floating ghost playlist thumbnails */
  .bg-elements {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .ghost-thumb {
    position: absolute;
    border-radius: 8px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .ghost-thumb::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
    border-style: solid;
    border-color: transparent transparent transparent rgba(255,255,255,0.13);
  }
  /* Scattered at various sizes and positions */
  .gt1 { width: 140px; height: 80px; top: 40px; left: -20px; transform: rotate(-8deg); }
  .gt1::after { border-width: 10px 0 10px 18px; }
  .gt2 { width: 100px; height: 58px; top: 80px; left: 180px; transform: rotate(4deg); }
  .gt2::after { border-width: 8px 0 8px 14px; }
  .gt3 { width: 120px; height: 68px; bottom: 100px; left: 40px; transform: rotate(-3deg); }
  .gt3::after { border-width: 9px 0 9px 16px; }
  .gt4 { width: 160px; height: 90px; top: -10px; right: 80px; transform: rotate(6deg); }
  .gt4::after { border-width: 12px 0 12px 20px; }
  .gt5 { width: 90px; height: 52px; bottom: 50px; right: -10px; transform: rotate(-5deg); }
  .gt5::after { border-width: 7px 0 7px 12px; }
  .gt6 { width: 110px; height: 62px; top: 200px; right: 30px; transform: rotate(3deg); }
  .gt6::after { border-width: 8px 0 8px 14px; }
  .gt7 { width: 130px; height: 74px; bottom: 20px; left: 300px; transform: rotate(7deg); }
  .gt7::after { border-width: 10px 0 10px 17px; }
  .gt8 { width: 80px; height: 46px; top: 30px; left: 400px; transform: rotate(-6deg); }
  .gt8::after { border-width: 6px 0 6px 10px; }
  .gt9 { width: 150px; height: 85px; bottom: -20px; right: 200px; transform: rotate(2deg); }
  .gt9::after { border-width: 11px 0 11px 19px; }
  .gt10 { width: 70px; height: 40px; top: 140px; left: 80px; transform: rotate(-10deg); }
  .gt10::after { border-width: 5px 0 5px 9px; }

  /* Content z-index above bg */
  .text-side, .compare {
    position: relative;
    z-index: 1;
  }

  .text-side {
    max-width: 400px;
  }
  .text-side h1 {
    font-size: 36px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .text-side p {
    font-size: 18px;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
  }
  /* Comparison */
  .compare {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .compare-card {
    width: 380px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    padding: 20px 24px;
  }
  .compare-card.enhanced {
    border: 2px solid #065fd4;
  }
  .compare-label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #909090;
    margin-bottom: 8px;
  }
  .compare-card.enhanced .compare-label {
    color: #065fd4;
  }
  .compare-count {
    font-size: 32px;
    font-weight: 700;
    color: #0f0f0f;
    margin-bottom: 4px;
  }
  .compare-desc {
    font-size: 14px;
    color: #606060;
  }
  .compare-bar {
    margin-top: 12px;
    height: 8px;
    background: #e8eaed;
    border-radius: 4px;
    overflow: hidden;
  }
  .compare-fill {
    height: 100%;
    border-radius: 4px;
  }
  .compare-fill.limited {
    width: 24%;
    background: #909090;
  }
  .compare-fill.full {
    width: 100%;
    background: linear-gradient(90deg, #065fd4, #3ea6ff);
  }
</style>
</head>
<body>
  <!-- Background: ghost video thumbnails with play buttons -->
  <div class="bg-elements">
    <div class="ghost-thumb gt1"></div>
    <div class="ghost-thumb gt2"></div>
    <div class="ghost-thumb gt3"></div>
    <div class="ghost-thumb gt4"></div>
    <div class="ghost-thumb gt5"></div>
    <div class="ghost-thumb gt6"></div>
    <div class="ghost-thumb gt7"></div>
    <div class="ghost-thumb gt8"></div>
    <div class="ghost-thumb gt9"></div>
    <div class="ghost-thumb gt10"></div>
  </div>

  <div class="text-side">
    <h1>Never lose a playlist again</h1>
    <p>YouTube's "Save to playlist" modal only shows your first 200 playlists — making the rest impossible to find. This extension loads and searches all of them.</p>
  </div>
  <div class="compare">
    <div class="compare-card">
      <div class="compare-label">YouTube default</div>
      <div class="compare-count">200</div>
      <div class="compare-desc">YouTube's built-in cap</div>
      <div class="compare-bar"><div class="compare-fill limited"></div></div>
    </div>
    <div class="compare-card enhanced">
      <div class="compare-label">With Playlist Search</div>
      <div class="compare-count">847</div>
      <div class="compare-desc">All your playlists, searchable</div>
      <div class="compare-bar"><div class="compare-fill full"></div></div>
    </div>
  </div>
</body>
</html>
