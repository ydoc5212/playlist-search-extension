<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 128px;
    height: 128px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #FF0000 0%, #CC0000 100%);
    border-radius: 24px;
    overflow: hidden;
  }
  .icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  /* Magnifying glass */
  .search {
    position: relative;
    width: 52px;
    height: 52px;
  }
  .search-circle {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 34px;
    height: 34px;
    border: 5px solid white;
    border-radius: 50%;
  }
  .search-handle {
    position: absolute;
    top: 32px;
    left: 30px;
    width: 6px;
    height: 20px;
    background: white;
    border-radius: 3px;
    transform: rotate(-45deg);
    transform-origin: top center;
  }
  /* Playlist lines */
  .lines {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 50px;
  }
  .line {
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.9);
  }
  .line:nth-child(2) { width: 80%; }
  .line:nth-child(3) { width: 60%; }
</style>
</head>
<body>
  <div class="icon-wrap">
    <div class="search">
      <div class="search-circle"></div>
      <div class="search-handle"></div>
    </div>
    <div class="lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>
</body>
</html>
