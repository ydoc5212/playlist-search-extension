<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 800px;
    background: linear-gradient(160deg, #1a1a1a 0%, #0f0f0f 100%);
    font-family: Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
  }

  .text-side {
    max-width: 380px;
  }
  .text-side h1 {
    font-size: 36px;
    font-weight: 500;
    color: #f1f1f1;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .text-side p {
    font-size: 18px;
    color: #aaa;
    line-height: 1.5;
  }

  .dialog {
    width: 420px;
    background: #212121;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .dialog-header {
    padding: 16px 20px 12px;
    font-size: 16px;
    font-weight: 500;
    color: #f1f1f1;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .filter-bar {
    padding: 10px 16px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: #212121;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-input-wrap {
    position: relative;
    flex: 1;
  }
  .filter-input {
    width: 100%;
    height: 36px;
    border: 1px solid rgba(62,166,255,0.5);
    border-radius: 18px;
    padding: 0 32px 0 12px;
    font-family: inherit;
    font-size: 14px;
    color: #f1f1f1;
    background: transparent;
    outline: 2px solid rgba(62,166,255,0.2);
    outline-offset: 0;
  }
  .filter-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .filter-meta {
    margin: 6px 2px 0;
    color: #aaa;
    font-size: 12px;
  }

  .playlist-list {
    max-height: 320px;
    overflow: hidden;
  }
  .playlist-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
  }
  .checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid #717171;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .checkbox.checked {
    background: #3ea6ff;
    border-color: #3ea6ff;
    position: relative;
  }
  .checkbox.checked::after {
    content: '✓';
    color: #0f0f0f;
    font-size: 12px;
    position: absolute;
    top: -1px;
    left: 2px;
  }
  .playlist-name {
    font-size: 14px;
    color: #f1f1f1;
  }
  .playlist-name mark {
    background: #1b4a7a;
    color: #f1f1f1;
    border-radius: 2px;
    padding: 0 1px;
  }
</style>
</head>
<body>
  <div class="text-side">
    <h1>Works in dark mode too</h1>
    <p>Seamlessly matches YouTube's dark theme. BM25 fuzzy search ranks results as you type.</p>
  </div>
  <div class="dialog">
    <div class="dialog-header">Save video to...</div>
    <div class="filter-bar">
      <div class="filter-row">
        <div class="filter-input-wrap">
          <input class="filter-input" value="chill beats" readonly>
          <button class="filter-clear">✕</button>
        </div>
      </div>
      <div class="filter-meta">5 of 847 playlists</div>
    </div>
    <div class="playlist-list">
      <div class="playlist-row">
        <div class="checkbox"></div>
        <span class="playlist-name"><mark>chill</mark> <mark>beats</mark> for focus</span>
      </div>
      <div class="playlist-row">
        <div class="checkbox"></div>
        <span class="playlist-name"><mark>chill</mark>hop <mark>beats</mark></span>
      </div>
      <div class="playlist-row">
        <div class="checkbox checked"></div>
        <span class="playlist-name">late night <mark>chill</mark></span>
      </div>
    </div>
  </div>
</body>
</html>
