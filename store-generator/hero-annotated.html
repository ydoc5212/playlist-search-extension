<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 800px;
    background: linear-gradient(160deg, #f8f9fa 0%, #e8eaed 100%);
    font-family: Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle decorative background */
  body::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(6,95,212,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Mock YouTube save-to-playlist dialog ── */
  .dialog {
    width: 440px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.14), 0 2px 10px rgba(0,0,0,0.06);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .dialog-header {
    padding: 18px 22px 14px;
    font-size: 16px;
    font-weight: 500;
    color: #0f0f0f;
    border-bottom: 1px solid #e5e5e5;
  }

  /* Filter bar (the extension injects this) */
  .filter-bar {
    padding: 12px 18px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    background: #fff;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-input-wrap {
    position: relative;
    flex: 1;
  }
  .filter-input {
    width: 100%;
    height: 38px;
    border: 1px solid rgba(6,95,212,0.55);
    border-radius: 19px;
    padding: 0 34px 0 14px;
    font-family: inherit;
    font-size: 14px;
    color: #0f0f0f;
    outline: 2px solid rgba(6,95,212,0.28);
    outline-offset: 0;
    background: #fff;
  }
  .filter-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #606060;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .filter-meta {
    margin: 7px 2px 0;
    color: #606060;
    font-size: 12px;
    font-weight: 400;
  }

  /* Playlist rows */
  .playlist-list {
    max-height: 320px;
    overflow: hidden;
  }
  .playlist-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 22px;
  }
  .checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid #909090;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .checkbox.checked {
    background: #065fd4;
    border-color: #065fd4;
    position: relative;
  }
  .checkbox.checked::after {
    content: '\2713';
    color: white;
    font-size: 12px;
    position: absolute;
    top: -1px;
    left: 2px;
  }
  .playlist-name {
    font-size: 14px;
    color: #0f0f0f;
  }
  .playlist-name mark {
    background: #bbdefb;
    color: #0f0f0f;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── Annotation callouts ── */
  .annotation {
    position: absolute;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 0;
    pointer-events: none;
  }
  .annotation-label {
    background: #065fd4;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(6,95,212,0.25);
    letter-spacing: 0.2px;
  }
  .annotation-line {
    flex-shrink: 0;
  }

  /* Annotation 1 — "Instant search" pointing to the input */
  .annotation-search {
    top: 262px;
    left: 90px;
  }

  /* Annotation 2 — "847 playlists loaded" pointing to the counter */
  .annotation-count {
    top: 360px;
    left: 90px;
  }

  /* Annotation 3 — "Fuzzy match highlighting" pointing to a highlighted term */
  .annotation-fuzzy {
    top: 400px;
    right: 90px;
  }

  /* ── Wrapper to position dialog + annotations ── */
  .scene {
    position: relative;
    width: 1280px;
    height: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dialog-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* ── Extension badge in the corner ── */
  .badge {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .badge-icon {
    width: 36px;
    height: 36px;
    background: #065fd4;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(6,95,212,0.2);
  }
  .badge-icon svg {
    width: 20px;
    height: 20px;
  }
  .badge-text {
    font-size: 22px;
    font-weight: 500;
    color: #0f0f0f;
    letter-spacing: -0.3px;
  }
  .badge-text span {
    font-weight: 300;
    color: #606060;
    margin-left: 2px;
  }

  /* Subtitle */
  .subtitle {
    position: absolute;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    color: #909090;
    white-space: nowrap;
    letter-spacing: 0.1px;
  }
</style>
</head>
<body>
  <div class="scene">

    <!-- Extension name at top -->
    <div class="badge">
      <div class="badge-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="6" stroke="white" stroke-width="2.2"/>
          <line x1="15.5" y1="15.5" x2="19" y2="19" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="badge-text">YouTube Playlist Filter</div>
    </div>

    <!-- Dialog -->
    <div class="dialog-wrap">
      <div class="dialog">
        <div class="dialog-header">Save video to...</div>
        <div class="filter-bar">
          <div class="filter-row">
            <div class="filter-input-wrap">
              <input class="filter-input" value="lofi" readonly>
              <button class="filter-clear">&times;</button>
            </div>
          </div>
          <div class="filter-meta">3 of 847 playlists</div>
        </div>
        <div class="playlist-list">
          <div class="playlist-row">
            <div class="checkbox"></div>
            <span class="playlist-name"><mark>lofi</mark> study sessions</span>
          </div>
          <div class="playlist-row">
            <div class="checkbox checked"></div>
            <span class="playlist-name"><mark>lofi</mark> beats for focus</span>
          </div>
          <div class="playlist-row">
            <div class="checkbox"></div>
            <span class="playlist-name">chill <mark>lofi</mark> &amp; rain</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Annotation: Instant search -->
    <div class="annotation annotation-search">
      <div class="annotation-label">Instant search</div>
      <svg class="annotation-line" width="120" height="44" viewBox="0 0 120 44">
        <path d="M 2 22 C 50 22, 80 30, 116 38" stroke="#065fd4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="117" cy="38" r="3.5" fill="#065fd4"/>
      </svg>
    </div>

    <!-- Annotation: 847 playlists loaded -->
    <div class="annotation annotation-count">
      <div class="annotation-label">847 playlists loaded</div>
      <svg class="annotation-line" width="120" height="44" viewBox="0 0 120 44">
        <path d="M 2 26 C 50 26, 80 14, 116 6" stroke="#065fd4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="117" cy="5" r="3.5" fill="#065fd4"/>
      </svg>
    </div>

    <!-- Annotation: Fuzzy match highlighting -->
    <div class="annotation annotation-fuzzy">
      <svg class="annotation-line" width="120" height="44" viewBox="0 0 120 44">
        <path d="M 118 22 C 70 22, 40 30, 4 36" stroke="#065fd4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="3" cy="36" r="3.5" fill="#065fd4"/>
      </svg>
      <div class="annotation-label">Fuzzy match highlighting</div>
    </div>

    <!-- Bottom subtitle -->
    <div class="subtitle">Search &amp; filter inside YouTube's "Save to playlist" dialog &mdash; even beyond the 200-playlist limit</div>

  </div>
</body>
</html>
