<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 800px;
    background: #0f0f0f;
    font-family: Roboto, Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Diagonal bands at 10 degrees */
  .band {
    position: absolute;
    width: 200%;
    left: -50%;
  }
  .band-1 {
    top: -120px;
    height: 380px;
    background: linear-gradient(135deg, #CC0000 0%, #FF0000 100%);
    transform: rotate(-10deg);
    opacity: 0.12;
  }
  .band-2 {
    top: 340px;
    height: 220px;
    background: linear-gradient(135deg, #FF0000 0%, #CC0000 100%);
    transform: rotate(-10deg);
    opacity: 0.07;
  }
  .band-3 {
    top: 600px;
    height: 160px;
    background: #FF0000;
    transform: rotate(-10deg);
    opacity: 0.05;
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    padding: 0 100px;
  }

  .text-side {
    max-width: 440px;
  }
  .label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #FF0000;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }
  p {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .cta {
    display: inline-block;
    padding: 14px 32px;
    background: #FF0000;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border-radius: 8px;
    text-decoration: none;
    letter-spacing: 0.5px;
  }

  /* Mock dialog tilted to match */
  .dialog-wrap {
    transform: rotate(-10deg);
    flex-shrink: 0;
  }
  .dialog {
    width: 380px;
    background: #212121;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .dialog-header {
    padding: 14px 18px 10px;
    font-size: 14px;
    font-weight: 500;
    color: #f1f1f1;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .filter-bar {
    padding: 10px 14px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .filter-input {
    width: 100%;
    height: 34px;
    border: 1px solid rgba(255,0,0,0.4);
    border-radius: 17px;
    padding: 0 12px;
    background: rgba(255,255,255,0.04);
    color: #f1f1f1;
    font-family: inherit;
    font-size: 13px;
  }
  .filter-meta {
    margin-top: 4px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
  }
  .check {
    width: 16px;
    height: 16px;
    border: 2px solid #555;
    border-radius: 3px;
  }
  .check.on {
    background: #FF0000;
    border-color: #FF0000;
  }
  .name {
    font-size: 13px;
    color: #f1f1f1;
  }
  .name mark {
    background: rgba(255,0,0,0.25);
    color: #f1f1f1;
    border-radius: 2px;
    padding: 0 2px;
  }

  .angle-label {
    position: absolute;
    bottom: 30px;
    right: 60px;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="band band-1"></div>
  <div class="band band-2"></div>
  <div class="band band-3"></div>

  <div class="content">
    <div class="text-side">
      <div class="label">Chrome Extension</div>
      <h1>Find any playlist instantly</h1>
      <p>Search and filter inside YouTube's Save to playlist dialog — even beyond the 200 limit.</p>
      <a class="cta" href="#">Add to Chrome</a>
    </div>
    <div class="dialog-wrap">
      <div class="dialog">
        <div class="dialog-header">Save video to...</div>
        <div class="filter-bar">
          <input class="filter-input" value="lofi" readonly>
          <div class="filter-meta">3 of 847 playlists</div>
        </div>
        <div class="row">
          <div class="check"></div>
          <span class="name"><mark>lofi</mark> study sessions</span>
        </div>
        <div class="row">
          <div class="check on"></div>
          <span class="name"><mark>lofi</mark> beats for focus</span>
        </div>
        <div class="row">
          <div class="check"></div>
          <span class="name">chill <mark>lofi</mark> & rain</span>
        </div>
      </div>
    </div>
  </div>

  <div class="angle-label">10° aggressive</div>
</body>
</html>
